name: wog_bible_section
description: Bible section for WOG App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  xml: ^6.3.0 # XML ని చదవడానికి

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/bible.xml # ఇక్కడ మీ XML ఫైల్ లింక్ చేసాము
